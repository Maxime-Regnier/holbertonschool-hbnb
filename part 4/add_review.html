<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="brand">
            <img src="images/logo.png" alt="HBnB logo" class="logo">
            <h1>HBnB</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="place.html">Place Details</a>
            <a href="login.html" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Add Review</h2>
            <form class="add-review form" action="#" method="post">
                <label for="review-text">Comment</label>
                <textarea id="review-text" name="review-text" rows="5" required></textarea>

                <label for="rating">Rating</label>
                <select id="rating" name="rating" required>
                    <option value="">Select rating</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

                <button type="submit" class="details-button">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>All rights reserved.</p>
    </footer>
</body>
</html>
