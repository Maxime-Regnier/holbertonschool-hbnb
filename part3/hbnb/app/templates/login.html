<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-page="login">
    <header class="site-header">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="HBnB logo" class="logo">
            <h1>HBnB</h1>
        </div>
        <nav class="navigation">
            <a href="/index.html">Places</a>
            <a href="/login.html">Login</a>
            <a href="#" id="auth-link" class="login-button">Login</a>
        </nav>
    </header>

    <main class="container narrow">
        <section class="panel">
            <h2>Login</h2>
            <p class="subtitle">Use your account to access places and add reviews.</p>

            <p id="login-error" class="error-message" aria-live="assertive"></p>
            <form id="login-form" class="form" novalidate>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required autocomplete="email">

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required autocomplete="current-password">

                <button type="submit" class="details-button">Sign in</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
