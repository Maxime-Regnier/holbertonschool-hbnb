<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Details</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-page="place">
    <header class="site-header">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="HBnB logo" class="logo">
            <h1>HBnB</h1>
        </div>
        <nav class="navigation">
            <a href="/index.html">Places</a>
            <a href="/login.html">Login</a>
            <a href="#" id="auth-link" class="login-button">Login</a>
        </nav>
    </header>

    <main class="container">
        <p id="status-message" class="status-message" aria-live="polite"></p>

        <section id="place-details" class="place-details"></section>

        <section class="review-actions">
            <a id="add-review-link" class="details-button" href="/add_review.html">Add Review</a>
        </section>

        <section>
            <h3>Reviews</h3>
            <div id="reviews-container"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
