<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Places</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-page="index">
    <header class="site-header">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="HBnB logo" class="logo">
            <h1>HBnB</h1>
        </div>
        <nav class="navigation">
            <a href="/index.html">Places</a>
            <a href="/login.html">Login</a>
            <a href="#" id="auth-link" class="login-button">Login</a>
        </nav>
    </header>

    <main class="container">
        <section class="filter-panel">
            <label for="country-filter">Filter by country</label>
            <select id="country-filter">
                <option value="all">All countries</option>
            </select>
        </section>

        <p id="status-message" class="status-message" aria-live="polite"></p>
        <section id="places-container" class="places-grid" aria-live="polite"></section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
