<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-page="add_review">
    <header class="site-header">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="HBnB logo" class="logo">
            <h1>HBnB</h1>
        </div>
        <nav class="navigation">
            <a href="/index.html">Places</a>
            <a href="/login.html">Login</a>
            <a href="#" id="auth-link" class="login-button">Login</a>
        </nav>
    </header>

    <main class="container narrow">
        <section class="panel add-review">
            <h2>Add Review</h2>
            <p id="place-title" class="subtitle"></p>
            <p id="review-error" class="error-message" aria-live="assertive"></p>

            <form id="add-review-form" class="form" novalidate>
                <label for="text">Comment</label>
                <textarea id="text" name="text" rows="5" required></textarea>

                <label for="rating">Rating</label>
                <select id="rating" name="rating" required>
                    <option value="">Select a rating</option>
                    <option value="1">1 - Poor</option>
                    <option value="2">2 - Fair</option>
                    <option value="3">3 - Good</option>
                    <option value="4">4 - Very good</option>
                    <option value="5">5 - Excellent</option>
                </select>

                <button type="submit" class="details-button">Submit Review</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
